<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
</head>

<body>
    <header>
        <h1>Image Gallery</h1>
    </header>
    <main>
        <div id="image-container">
            <section>
                <img id="image" src="12.jpeg" alt="">
                <figure>
                    <figcaption>hello</figcaption>
                </figure>
            </section>
        </div>
    </main>
    <footer>
        <p>Image Gallery</p>
    </footer>

    <style>
        #image-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 20px;
            margin: 20px;
            background-color: #f9f9f9;
            width: fit-content;
            height: fit-content;
            text-align: center;

        }

        #image {
            width: 200px;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
        }

        #image:hover {
            transform: scale(1.1);
            transition: 0.5s;
        }
    </style>
</body>

</html>
