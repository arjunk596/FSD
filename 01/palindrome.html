<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palindrome</title>
</head>
<body>
    <div>
        <label>Enter a String <input type="text" id="string"></label>
        <button onclick="palindrome()">Check</button>
        <p id="output"></p>
    </div>

    <script>
        function palindrome(){
            let arr = document.getElementById("string").value;
            let rev = document.getElementById("string").value.split("").reverse().join("");
            
            if(arr === rev){
                document.getElementById("output").textContent = "Is a palindrome";
            } else {
                document.getElementById("output").textContent = "Is not a palindrome";
            }

            document.getElementById("string").value = "";

        }
    </script>
</body>
</html>
