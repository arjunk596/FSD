<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Card Layout</title>
</head>

<body>
    <header>
        <h1>Product Card Layout</h1>
    </header>
    <main>
        <div id="product-container">
            <section id="product-card">
                <img class="images" src="" alt="">
                <h2>Product Name</h2>
                <p>Product Description</p>
                <button id="add-to-cart">Add to Cart</button>
            </section>
        </div>
    </main>

    <style>
        #product-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 20px;
            margin: 20px;
            background-color: #f9f9f9;
            width: 200px;
            height: 300px;
            text-align: center;
        }

        #product-card {
            /* super important*/
            display: flex;
            flex-direction: column;
            /* stack items top to bottom */
            align-items: center;
            /* center items horizontally */
            width: 100%;
            height: 100%;
        }

        .images {
            width: 100px;
            height: 100px;
            border-radius: 50%;
        }

        #add-to-cart {
            margin-top: auto;
            /* pushes button to the bottom */
            background-color: #4CAF50;
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            font-size: 16px;
            cursor: pointer;
            border-radius: 10px;
        }
    </style>
</body>

</html>
