<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Table</title>
</head>

<body>
    <header>
        <h1>Student Result Table</h1>
    </header>
    <main>
        <div id="table-container">
            <section>
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Maths</th>
                            <th>Science</th>
                            <th>English</th>
                            <th>Total</th>
                            <th>Result</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Arjun</td>
                            <td>90</td>
                            <td>85</td>
                            <td>95</td>
                            <td>270</td>
                            <td>Pass</td>
                        </tr>
                        <tr>
                            <td>Aisha</td>
                            <td>80</td>
                            <td>85</td>
                            <td>90</td>
                            <td>255</td>
                            <td>Pass</td>
                        </tr>
                        <tr>
                            <td>Riya</td>
                            <td>70</td>
                            <td>75</td>
                            <td>80</td>
                            <td>225</td>
                            <td>Pass</td>
                        </tr>
                        <tr>
                            <td>Rahul</td>
                            <td>60</td>
                            <td>65</td>
                            <td>70</td>
                            <td>195</td>
                            <td>Pass</td>
                        </tr>
                        <tr>
                            <td>Priya</td>
                            <td>50</td>
                            <td>55</td>
                            <td>60</td>
                            <td>165</td>
                            <td>Pass</td>
                        </tr>
                        <tr>
                            <td>Amit</td>
                            <td>40</td>
                            <td>45</td>
                            <td>50</td>
                            <td>135</td>
                            <td>Pass</td>
                        </tr>
                    </tbody>
                </table>
            </section>
        </div>
    </main>

    <style>
        #table-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 20px;
            margin: 20px;
            background-color: #f9f9f9;
            width: fit-content;
            height: 100%;
            text-align: center;
            border-collapse: collapse;
            border: 1px solid black;
        }

        tr {
            border: 1px solid black;
        }

        tbody tr:nth-child(odd) {
            background-color: #ffffff;
        }

        tbody tr:nth-child(even) {
            background-color: #d6eaf8;
        }

        table {
            width: 100%;
            height: 100%;
            border: 1px solid black;
        }
    </style>
</body>

</html>
