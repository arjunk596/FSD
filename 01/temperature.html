<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
</head>
<body>
    <div>
        <label>Enter Temperature <input type="number" id="input"></label>
        <label>C <input type="radio" name="convert" value="FtoC"/></label>
        <label>F <input type="radio" name="convert" value="CtoF"/></label>
        <button onclick="convert()">Convert</button>
        <p id="result"></p>
    </div>

    <script>
        function convert(){
            let temp = parseFloat(document.getElementById("input").value);
            let mode = document.querySelector('input[name="convert"]:checked').value;
            let finalTemp = 0;

            if(mode === "FtoC"){
                finalTemp = (temp - 32) * 5/9;
                document.getElementById("result").innerHTML = finalTemp;
            }else{
                finalTemp = (temp * 9/5) + 32;
                document.getElementById("result").innerHTML = finalTemp;
            }
        }
    </script>

</body>
</html>
